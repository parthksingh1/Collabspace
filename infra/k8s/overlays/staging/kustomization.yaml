apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collabspace-staging

namePrefix: staging-

bases:
  - ../../base

commonLabels:
  environment: staging

# Staging image tags - set by CI/CD
images:
  - name: gcr.io/collabspace/api-gateway
    newTag: staging
  - name: gcr.io/collabspace/ws-gateway
    newTag: staging
  - name: gcr.io/collabspace/auth-service
    newTag: staging
  - name: gcr.io/collabspace/doc-service
    newTag: staging
  - name: gcr.io/collabspace/code-service
    newTag: staging
  - name: gcr.io/collabspace/board-service
    newTag: staging
  - name: gcr.io/collabspace/project-service
    newTag: staging
  - name: gcr.io/collabspace/notification-service
    newTag: staging
  - name: gcr.io/collabspace/ai-service
    newTag: staging
  - name: gcr.io/collabspace/web
    newTag: staging

patches:
  # Reduce replicas for staging
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: ws-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: auth-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: doc-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: code-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: board-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: project-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: notification-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: ai-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Reduce resource limits for staging
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m

  # Reduce HPA for staging
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Redis single replica in staging
  - target:
      kind: StatefulSet
      name: redis
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Kafka single broker in staging
  - target:
      kind: StatefulSet
      name: kafka
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: zookeeper
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

patchesStrategicMerge:
  - staging-config.yaml
