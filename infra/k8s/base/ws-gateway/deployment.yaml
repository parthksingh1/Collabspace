apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
  namespace: collabspace
  labels:
    app.kubernetes.io/name: ws-gateway
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/component: gateway
spec:
  replicas: 5
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ws-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ws-gateway
        app.kubernetes.io/part-of: collabspace
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: collabspace-sa
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ws-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ws-gateway
          image: gcr.io/collabspace/ws-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: collabspace-config
            - secretRef:
                name: collabspace-secrets
          env:
            - name: PORT
              value: "4001"
            - name: SERVICE_NAME
              value: ws-gateway
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: 1500m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
