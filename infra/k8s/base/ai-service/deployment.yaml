apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: collabspace
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-service
        app.kubernetes.io/part-of: collabspace
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4008"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: collabspace-sa
      terminationGracePeriodSeconds: 60
      nodeSelector:
        cloud.google.com/gke-nodepool: compute-pool
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ai-service
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: compute-intensive
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: ai-service
          image: gcr.io/collabspace/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: collabspace-config
            - secretRef:
                name: collabspace-secrets
          env:
            - name: PORT
              value: "4008"
            - name: SERVICE_NAME
              value: ai-service
          resources:
            requests:
              memory: 512Mi
              cpu: 1000m
            limits:
              memory: 2Gi
              cpu: 2000m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
