apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: collabspace
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/part-of: collabspace
        app.kubernetes.io/component: tracing
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.55
          ports:
            - name: ui
              containerPort: 16686
            - name: collector-http
              containerPort: 14268
            - name: collector-grpc
              containerPort: 14250
            - name: agent-compact
              containerPort: 6831
              protocol: UDP
            - name: agent-binary
              containerPort: 6832
              protocol: UDP
            - name: zipkin
              containerPort: 9411
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: badger
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: /badger/data
            - name: BADGER_DIRECTORY_KEY
              value: /badger/key
          volumeMounts:
            - name: jaeger-data
              mountPath: /badger
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: jaeger-data
          persistentVolumeClaim:
            claimName: jaeger-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data
  namespace: collabspace
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: collabspace
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: collabspace
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: ui
    - name: collector-http
      port: 14268
      targetPort: collector-http
    - name: collector-grpc
      port: 14250
      targetPort: collector-grpc
    - name: agent-compact
      port: 6831
      targetPort: agent-compact
      protocol: UDP
    - name: agent-binary
      port: 6832
      targetPort: agent-binary
      protocol: UDP
    - name: zipkin
      port: 9411
      targetPort: zipkin
  selector:
    app.kubernetes.io/name: jaeger
