version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - collabspace
  env_file:
    - .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ───────────────────────────── Application Services ─────────────────────────
  api-gateway:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    image: collabspace/api-gateway:${IMAGE_TAG:-latest}
    container_name: collabspace-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4002
      DOC_SERVICE_URL: http://doc-service:4003
      CODE_SERVICE_URL: http://code-service:4004
      BOARD_SERVICE_URL: http://board-service:4005
      PROJECT_SERVICE_URL: http://project-service:4006
      NOTIFICATION_SERVICE_URL: http://notification-service:4007
      AI_SERVICE_URL: http://ai-service:4008
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  ws-gateway:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: ws-gateway
    image: collabspace/ws-gateway:${IMAGE_TAG:-latest}
    container_name: collabspace-ws-gateway
    ports:
      - "${WS_GATEWAY_PORT:-4001}:4001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4001
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/health"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    image: collabspace/auth-service:${IMAGE_TAG:-latest}
    container_name: collabspace-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-4002}:4002"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=auth
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4002/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  doc-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: doc-service
    image: collabspace/doc-service:${IMAGE_TAG:-latest}
    container_name: collabspace-doc-service
    ports:
      - "${DOC_SERVICE_PORT:-4003}:4003"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=documents
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4003/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  code-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: code-service
    image: collabspace/code-service:${IMAGE_TAG:-latest}
    container_name: collabspace-code-service
    ports:
      - "${CODE_SERVICE_PORT:-4004}:4004"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=code
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4004/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  board-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: board-service
    image: collabspace/board-service:${IMAGE_TAG:-latest}
    container_name: collabspace-board-service
    ports:
      - "${BOARD_SERVICE_PORT:-4005}:4005"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=boards
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4005/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  project-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: project-service
    image: collabspace/project-service:${IMAGE_TAG:-latest}
    container_name: collabspace-project-service
    ports:
      - "${PROJECT_SERVICE_PORT:-4006}:4006"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4006
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=projects
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4006/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
    image: collabspace/notification-service:${IMAGE_TAG:-latest}
    container_name: collabspace-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-4007}:4007"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4007
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=notifications
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@collabspace.io}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4007/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ai-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: ai-service
    image: collabspace/ai-service:${IMAGE_TAG:-latest}
    container_name: collabspace-ai-service
    ports:
      - "${AI_SERVICE_PORT:-4008}:4008"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4008
      DATABASE_URL: postgresql://${POSTGRES_USER:-collabspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collabspace}?schema=ai
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-4096}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4008/health"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  web:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    image: collabspace/web:${IMAGE_TAG:-latest}
    container_name: collabspace-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    depends_on:
      api-gateway:
        condition: service_healthy

  # ───────────────────────────── Infrastructure Services ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: collabspace-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-collabspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-collabspace}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collabspace} -d ${POSTGRES_DB:-collabspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - collabspace
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: collabspace-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - collabspace
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: collabspace-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - collabspace

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: collabspace-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - collabspace

  # ───────────────────────────── Observability ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: collabspace-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - collabspace

  grafana:
    image: grafana/grafana:10.4.0
    container_name: collabspace-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - collabspace

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: collabspace-jaeger
    restart: unless-stopped
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - collabspace

  # ───────────────────────────── Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: collabspace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api-gateway:
        condition: service_healthy
      ws-gateway:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - collabspace

networks:
  collabspace:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  jaeger_data:
    driver: local
  nginx_certs:
    driver: local
  nginx_logs:
    driver: local
