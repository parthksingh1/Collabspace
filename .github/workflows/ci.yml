name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  # ─────────────────────────── Lint ───────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx turbo lint

      - name: Run Prettier check
        run: npx turbo format:check

  # ─────────────────────────── Type Check ─────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx turbo typecheck

  # ─────────────────────────── Test ───────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - ws-gateway
          - auth-service
          - doc-service
          - code-service
          - board-service
          - project-service
          - notification-service
          - ai-service
          - web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: collabspace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.service }}
        run: npx turbo test --filter=${{ matrix.service }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/collabspace_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: apps/${{ matrix.service }}/coverage/
          retention-days: 7

  # ─────────────────────────── Build Docker Images ────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=api-gateway
          - service: ws-gateway
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=ws-gateway
          - service: auth-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=auth-service
          - service: doc-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=doc-service
          - service: code-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=code-service
          - service: board-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=board-service
          - service: project-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=project-service
          - service: notification-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=notification-service
          - service: ai-service
            dockerfile: infra/docker/Dockerfile.service
            build_args: SERVICE_NAME=ai-service
          - service: web
            dockerfile: infra/docker/Dockerfile.web
            build_args: ""
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────── Deploy to Staging ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: collabspace-cluster
          location: us-central1

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags
        working-directory: infra/k8s/overlays/staging
        run: |
          SERVICES="api-gateway ws-gateway auth-service doc-service code-service board-service project-service notification-service ai-service web"
          for svc in $SERVICES; do
            kustomize edit set image gcr.io/collabspace/${svc}=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${svc}:${{ github.sha }}
          done

      - name: Deploy to staging
        run: |
          kustomize build infra/k8s/overlays/staging | kubectl apply -f -

      - name: Wait for rollout
        run: |
          DEPLOYMENTS="api-gateway ws-gateway auth-service doc-service code-service board-service project-service notification-service ai-service web"
          for deploy in $DEPLOYMENTS; do
            kubectl rollout status deployment/staging-${deploy} -n collabspace-staging --timeout=300s
          done

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress staging-collabspace-ingress -n collabspace-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -sf "http://${STAGING_URL}/api/health" || exit 1
          echo "Smoke tests passed"
